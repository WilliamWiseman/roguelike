<!DOCTYPE html>
<html>
    <head>
        <title>Circle collision!</title>
    </head>
    <body>

        <style>
            div{
                position:absolute;
                background-color:red;
                width:100px;
                height:100px;
                transform: translateX(-50%) translateY(-50%);
                top:100px;
                left:100px;
                border-radius:50%;
            }
        </style>

        <div id="a"></div>

        <div id="b"></div>

        <script>
            function circle(x, y, rad, id){
                this.x = x;
                this.y = y;
                this.rad = rad;
                this.element = document.getElementById(id);
                this.element.style.left = `${this.x}px;`;
                this.element.style.top = `${this.y}px;`;
                return this;
            }
            let circ1 = new circle(100, 150, 30, 'a');
            let circ2 = new circle(100, 210, 30, 'b');

            function collision(a, b){
                let distance = Math.sqrt( (a.x - b.x) * (a.x - b.x) + (a.y - b.y) * (a.y - b.y));
                if(distance < a.rad + b.rad){
                    return true;
                }else{
                    return false;
                }
            }
            alert(collision(circ1, circ2));
        </script>
    </body>
</html>
