<!DOCTYPE html>
<html>
    <head>
        <title>Circle collision!</title>
    </head>
    <body>

        <style>
            html{
                height:100%;
            }
            body{
                height:100%;
            }
            div{
                position:absolute;
                background-color:red;
                transform: translateX(-50%) translateY(-50%);
                border-radius:50%;
                z-index:2;
            }
            img{
                position:absolute;
                transform: translateX(-50%) translateY(-50%);
                border:1px solid red;
                z-index:2;
            }
            .hud{
                transform: translateX(0) translateY(0);
                position:absolute;
                width:100%;
                height:100%;
                top:0;
                left:0;
                border:0px solid transparent;
                z-index:100;
            }
        </style>
            <img src="images/hud.gif" class="hud" id="hud">
        <script>

            let hud = document.getElementById('hud');

            function circle(x, y, rad){
                this.x = x;
                this.y = y;
                this.rad = rad;
                return this;
            }

            let bulletSpeed = 1000;

            function arrow(x, y, deg, momX, momY, rad){
                this.x = x;
                this.y = y;
                this.rad = rad;
                this.deg = deg;
                this.momX = momX;
                this.momY = momY;
                this.active = true;

                this.element = document.createElement('img');
                this.element.src = 'images/arrow.gif';
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                this.element.style.width = `${9}px`;
                this.element.style.height = `${27}px`;
                this.element.style.transform = `translateX(-50%) translateY(-50%) rotate(${deg}deg)`;
                document.body.appendChild(this.element);

                arrow.prototype.move = function(){
                    this.x+= Math.floor(this.momX * dt * 100) / 100;
                    this.y+= Math.floor(this.momY * dt * 100) / 100;
                    this.element.style.left = `${this.x}px`;
                    this.element.style.top = `${this.y}px`;
                    for(let i = 0; i < enemies.length; i++){
                    if(collision(this, enemies[i])){
                        this.active = false;
                        this.element.remove();
                        alert('bang');
                    }
                }
                }

                return this;
            }

            let mouse = {
                x:0,
                y:0
            }

            function player(x, y, rad, weapon){
                this.x = x;
                this.y = y;
                this.rad = rad;
                this.weapon = weapon;
                this.momX = 0;
                this.momY = 0;
                this.element = document.createElement('img');
                this.element.src = "https://raw.githubusercontent.com/WilliamWiseman/roguelike/main/images/chest.gif";
                this.element.style.width = `${this.rad * 2}px`;
                this.element.style.height = `${this.rad * 2}px`;
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                document.body.appendChild(this.element);

                player.prototype.move = function(){
                    this.x += this.momX * dt;
                    this.y += this.momY * dt;
                    //position player
                    this.element.style.left = `${this.x}px`;
                    this.element.style.top = `${this.y}px`;
                    //position weapon
                    this.weapon.element.style.left = `${this.x}px`;
                    this.weapon.element.style.top = `${this.y}px`;
                    if(this.momX !== 0 || this.momY !== 0){
                        PLAYER.weapon.deg = getAngle(PLAYER, mouse);
                        PLAYER.weapon.element.style.transform = `translateX(-50%) translateY(-50%) rotate(${PLAYER.weapon.deg}deg)`;

                    }
                }

                player.prototype.atk = function(){
                    this.weapon.attack();
                }

            }

            function bow(damage, speed, sprite){
                this.damage = damage;
                this.speed = bulletSpeed;
                this.speed = speed;
                this.element = document.createElement('img');
                this.element.src = sprite;
                this.element.style.width = '140px';
                this.element.style.height = '140px';
                document.body.appendChild(this.element);
                this.deg = 0;

                bow.prototype.attack = function(){
                    let ratio = this.speed / distance(PLAYER, mouse);
                    bulletArr.push(new arrow(PLAYER.x, PLAYER.y, this.deg, (mouse.x - PLAYER.x) * ratio, (mouse.y - PLAYER.y) * ratio, 2));
                }
            }

            let bulletArr = [];
            let enemies = [];

            function distance(a, b){
                return Math.sqrt( (a.x - b.x) * (a.x - b.x) + (a.y - b.y) * (a.y - b.y));
            }

            function collision(a, b){
                let dist = distance(a, b);
                return dist < a.rad + b.rad;
            }

            function point(a, b){
                let deg = getAngle(a, b);
                a.element.style.transform = `translateX(-50%) translateY(-50%) rotate(${deg}deg)`;
            }

            function getAngle(a, b){
                return Math.atan2(b.y - a.y, b.x - a.x) * (180 / Math.PI) + 90;
            }

            let PLAYER = new player(100, 100, 40, new bow(1, 1000, 'images/bow.gif'));

            document.addEventListener("keydown", function (event) {
            event.preventDefault();
            let key = event.key;
            key = key.toLowerCase();
            switch (key) {
                case "a":
                    PLAYER.momX = -300;
                    break;
                case "d":
                    PLAYER.momX = 300;
                    break;
                case "w":
                    PLAYER.momY = -300;
                    break;
                case "s":
                    PLAYER.momY = 300;
                    break;
            }
        });

        document.addEventListener("keyup", function (event) {
            event.preventDefault();
            let key = event.key;
            key = key.toLowerCase();
            switch (key) {
                case "a":
                    if (PLAYER.momX < 0) {
                        PLAYER.momX = 0;
                    }
                    break;
                case "d":
                    if (PLAYER.momX > 0) {
                        PLAYER.momX = 0;
                    }
                    break;
                case "w":
                    if (PLAYER.momY < 0) {
                        PLAYER.momY = 0;
                    }
                    break;
                case "s":
                    if (PLAYER.momY > 0) {
                        PLAYER.momY = 0;
                    }
                    break;
            }
        });

            hud.addEventListener('mousemove', (event) => {
                mouse.x = event.offsetX;
                mouse.y = event.offsetY;
                PLAYER.weapon.deg = getAngle(PLAYER, mouse);
                PLAYER.weapon.element.style.transform = `translateX(-50%) translateY(-50%) rotate(${PLAYER.weapon.deg}deg)`;

            });

            hud.addEventListener('mousedown', (event) => {
                PLAYER.atk();
            });

            let lastTime = performance.now();
            let dt;

        function gameLoop(now){
            dt = (now - lastTime) / 1000;
            
            dt = Math.min(dt, 0.5);

                    let newArr = [];

                    PLAYER.move();

                for(let i = 0; i < bulletArr.length; i++){
                    bulletArr[i].move();
                    if(bulletArr[i].active){
                        newArr.push(bulletArr[i]);
                    }
                }
                    bulletArr = newArr;

            lastTime = now;
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);

        </script>
    </body>
</html>
