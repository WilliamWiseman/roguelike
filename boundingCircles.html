<!DOCTYPE html>
<html>
    <head>
        <title>Circle collision!</title>
    </head>
    <body>

        <style>
            html{
                height:100%;
            }
            body{
                height:100%;
            }
            div{
                position:absolute;
                background-color:red;
                transform: translateX(-50%) translateY(-50%);
                border-radius:50%;
            }
            img{
                position:absolute;
                transform: translateX(-50%) translateY(-50%);
                border:1px solid red;
            }
        </style>

        <img id="a" src="https://raw.githubusercontent.com/WilliamWiseman/roguelike/main/images/pointer.gif">

        <div id="b"></div>



        <script>

            function circle(x, y, rad, id){
                this.x = x;
                this.y = y;
                this.rad = rad;
                this.element = document.getElementById(id);
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                this.element.style.width = `${this.rad * 2}px`;
                this.element.style.height = `${this.rad * 2}px`;
                return this;
            }

            let bulletSpeed = 1000;

            function bullet(x, y, deg, momX, momY, rad){
                this.x = x;
                this.y = y;
                this.rad = rad;
                this.deg = deg;
                this.momX = momX;
                this.momY = momY;
                this.active = true;

                this.element = document.createElement('div');
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
                this.element.style.width = `${this.rad * 2}px`;
                this.element.style.height = `${this.rad * 2}px`;
                this.element.style.transform = `translateX(-50%) translateY(-50%) rotate(${deg}deg)`;
                document.body.appendChild(this.element);

                bullet.prototype.move = function(){
                    this.x+= Math.floor(this.momX * dt * 100) / 100;
                    this.y+= Math.floor(this.momY * dt * 100) / 100;
                    this.element.style.left = `${this.x}px`;
                    this.element.style.top = `${this.y}px`;
                    if(collision(this, circ1)){
                        this.active = false;
                        this.element.remove();
                        alert('bang');
                    }
                }

                return this;
            }

            let bulletArr = [];

            let circ1 = new circle(100, 100, 30, 'b');
            let circ2 = new circle(100, 100, 30, 'a');

            function distance(a, b){
                return Math.sqrt( (a.x - b.x) * (a.x - b.x) + (a.y - b.y) * (a.y - b.y));
            }

            function collision(a, b){
                let dist = distance(a, b);
                return dist < a.rad + b.rad;
            }

            function point(a, b){
                let deg = getAngle(a, b);
                //alert(`Up:${up} Right:${right} Degrees:${deg}`);
                let ratio = bulletSpeed / distance(a, b);
                bulletArr.push(new bullet(a.x, a.y, deg, (b.x - a.x) * ratio, (b.y - a.y) * ratio, 2));
                a.element.style.transform = `translateX(-50%) translateY(-50%) rotate(${deg}deg)`;
            }

            function getAngle(a, b){
                return Math.atan2(b.y - a.y, b.x - a.x) * (180 / Math.PI) + 90;
            }

            document.addEventListener('mousedown', (event) => {
                circ1.x = event.offsetX;
                circ1.y = event.offsetY;
                circ1.element.style.left = `${circ1.x}px`;
                circ1.element.style.top = `${circ1.y}px`;
                point(circ2, circ1);
            });

            let lastTime = performance.now();
            let dt;

        function gameLoop(now){
            dt = (now - lastTime) / 1000;
            
            dt = Math.min(dt, 0.5);

                    let newArr = [];

                for(let i = 0; i < bulletArr.length; i++){
                    bulletArr[i].move();
                    if(bulletArr[i].active){
                        newArr.push(bulletArr[i]);
                    }
                }
                    bulletArr = newArr;

            lastTime = now;
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);

        </script>
    </body>
</html>
